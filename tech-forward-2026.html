<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Forward 2026</title>
    <style>

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.6;
    margin: 0;
    padding: 0;
    background-color: #f4f4f4;
    color: #333;
}

header {
    background: #333;
    color: #fff;
    padding: 1rem 0;
    text-align: center;
}

h1 {
    margin: 0;
}

.search-container {
    padding: 1rem 0;
}

#search {
    width: 80%;
    max-width: 400px;
    padding: 0.5rem;
    border: 1px solid #ccc;
    border-radius: 5px;
}

#schedule {
    max-width: 800px;
    margin: 2rem auto;
    padding: 0 1rem;
}

.talk {
    background: #fff;
    border-left: 5px solid #333;
    margin-bottom: 1.5rem;
    padding: 1rem 1.5rem;
    border-radius: 5px;
}

.talk h2 {
    margin-top: 0;
}

.talk-meta {
    font-size: 0.9rem;
    color: #555;
    margin-bottom: 0.5rem;
}

.talk-meta span {
    margin-right: 1rem;
}

.categories span {
    background: #eee;
    color: #333;
    padding: 0.2rem 0.5rem;
    border-radius: 3px;
    font-size: 0.8rem;
    margin-right: 0.5rem;
}

.break {
    text-align: center;
    font-style: italic;
    color: #777;
    margin-bottom: 1.5rem;
}
    </style>
</head>
<body>
    <header>
        <h1>Tech Forward 2026</h1>
        <div class="search-container">
            <input type="text" id="search" placeholder="Search by category (e.g., AI, JavaScript)">
        </div>
    </header>
    <main id="schedule">
        <!-- Schedule will be generated by JavaScript -->
    </main>
    <script>

const talks = [
    {
        "time": "10:00 AM - 11:00 AM",
        "title": "The Future of AI in Web Development",
        "speakers": ["Dr. Evelyn Reed"],
        "categories": ["AI", "Web Development", "JavaScript"],
        "description": "A deep dive into how artificial intelligence is shaping the future of web development, from automated coding to intelligent user interfaces."
    },
    {
        "time": "11:10 AM - 12:10 PM",
        "title": "Modern CSS: Beyond Flexbox and Grid",
        "speakers": ["John Steele"],
        "categories": ["CSS", "Frontend"],
        "description": "Exploring the latest advancements in CSS, including new layout modules, container queries, and what's next for styling on the web."
    },
    {
        "time": "12:20 PM - 01:20 PM",
        "title": "Building Scalable APIs with Node.js",
        "speakers": ["Maria Rodriguez", "David Chen"],
        "categories": ["Node.js", "Backend", "API"],
        "description": "Learn the best practices for designing, building, and scaling robust APIs using Node.js, Express, and modern architectural patterns."
    },
    {
        "time": "02:20 PM - 03:20 PM",
        "title": "The Rise of WebAssembly",
        "speakers": ["Kenji Tanaka"],
        "categories": ["WebAssembly", "Performance"],
        "description": "An introduction to WebAssembly (Wasm) and how it's enabling near-native performance for web applications in languages other than JavaScript."
    },
    {
        "time": "03:30 PM - 04:30 PM",
        "title": "State of the Jamstack in 2026",
        "speakers": ["Fatima Al-Jamil"],
        "categories": ["Jamstack", "Frontend", "Serverless"],
        "description": "A comprehensive overview of the Jamstack ecosystem, exploring the latest tools, frameworks, and deployment strategies for building fast and secure websites."
    },
    {
        "time": "04:40 PM - 05:40 PM",
        "title": "Cybersecurity for Developers",
        "speakers": ["Tom Hardy"],
        "categories": ["Security", "Web Development"],
        "description": "A practical guide for developers on how to write more secure code, prevent common vulnerabilities, and build a security-first mindset."
    }
];

const scheduleContainer = document.getElementById('schedule');
const searchInput = document.getElementById('search');

function renderSchedule(filteredTalks) {
    scheduleContainer.innerHTML = '';
    let talkIndex = 0;

    const scheduleData = [
        { type: 'talk', index: talkIndex++ },
        { type: 'break', time: '11:00 AM - 11:10 AM' },
        { type: 'talk', index: talkIndex++ },
        { type: 'break', time: '12:10 PM - 12:20 PM' },
        { type: 'talk', index: talkIndex++ },
        { type: 'lunch', time: '01:20 PM - 02:20 PM' },
        { type: 'talk', index: talkIndex++ },
        { type: 'break', time: '03:20 PM - 03:30 PM' },
        { type: 'talk', index: talkIndex++ },
        { type: 'break', time: '04:30 PM - 04:40 PM' },
        { type: 'talk', index: talkIndex++ },
    ];

    scheduleData.forEach(item => {
        if (item.type === 'talk') {
            const talk = filteredTalks[item.index];
            if (talk) {
                const talkElement = document.createElement('div');
                talkElement.classList.add('talk');
                talkElement.innerHTML = `
                    <div class="talk-meta">
                        <span>${talk.time}</span>
                    </div>
                    <h2>${talk.title}</h2>
                    <div class="talk-meta">
                        <span><strong>Speakers:</strong> ${talk.speakers.join(', ')}</span>
                    </div>
                    <div class="categories">
                        ${talk.categories.map(cat => `<span>${cat}</span>`).join('')}
                    </div>
                    <p>${talk.description}</p>
                `;
                scheduleContainer.appendChild(talkElement);
            }
        } else if (item.type === 'break' || item.type === 'lunch') {
             const breakElement = document.createElement('div');
             breakElement.classList.add('break');
             const breakText = item.type === 'lunch' ? 'Lunch Break' : 'Break';
             breakElement.textContent = `${item.time}: ${breakText}`;
             scheduleContainer.appendChild(breakElement);
        }
    });
}


function filterTalks() {
    const searchTerm = searchInput.value.toLowerCase();
    const filteredTalks = talks.filter(talk =>
        talk.categories.some(cat => cat.toLowerCase().includes(searchTerm))
    );
    renderSchedule(filteredTalks);
}

searchInput.addEventListener('input', filterTalks);

// Initial render
renderSchedule(talks);
    </script>
</body>
</html>
